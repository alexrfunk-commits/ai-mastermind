}

}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function renderCalls() {
  const container = document.getElementById('call-container');
  const totalEl = document.getElementById('total-calls');
  const badgeEl = document.getElementById('call-count-badge');
  const latestEl = document.getElementById('latest-date');

  const sorted = [...CALLS].sort((a, b) => new Date(b.date) - new Date(a.date));

  totalEl.textContent = CALLS.length;
  badgeEl.textContent = CALLS.length + ' session' + (CALLS.length !== 1 ? 's' : '');

  if (sorted.length > 0) {
    const d = new Date(sorted[0].date + 'T12:00:00');
    latestEl.textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  if (CALLS.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">\uD83C\uDF99\uFE0F</div><h3>First session coming soon</h3><p>Sessions will appear here automatically after each call.</p></div>';
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'call-grid';

  sorted.forEach(function(call, i) {
    const num = CALLS.length - i;
    const card = document.createElement('div');
    card.className = 'call-card';
    card.onclick = function() { openModal(call, num); };

    const topTakeaways = (call.takeaways || []).slice(0, 3);
    const takeawayHTML = topTakeaways.map(function(t) {
      return '<div class="takeaway-item">' + t + '</div>';
    }).join('');

    card.innerHTML = '<div class="card-top"><span class="call-number">Session ' + num + '</span><span class="call-date">' + formatDate(call.date) + '</span></div>' +
      '<div class="card-title">' + call.title + '</div>' +
      '<div class="card-summary">' + call.summary_brief + '</div>' +
      (topTakeaways.length ? '<div class="card-takeaways"><div class="takeaway-label">Key Takeaways</div>' + takeawayHTML + '</div>' : '') +
      '<div class="card-footer"><span class="view-btn">Full recap <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7h12M7 1l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>' +
      (call.recording_url ? '<span class="recording-badge">\u25B6 Recording</span>' : '') +
      '</div>';

    grid.appendChild(card);
  });

  container.innerHTML = '';
  container.appendChild(grid);
}

function openModal(call, num) {
  var content = document.getElementById('modal-content');
  var takeawayHTML = (call.takeaways || []).map(function(t) {
    return '<div class="modal-takeaway"><span class="modal-takeaway-icon">\u2192</span>' + t + '</div>';
  }).join('');

  var recordingHTML = call.recording_url
    ? '<a href="' + call.recording_url + '" target="_blank" class="recording-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Watch Recording</a>'
    : '<div class="no-recording">Recording not available for this session</div>';

  content.innerHTML = '<div class="modal-eyebrow">Session ' + num + '</div>' +
    '<div class="modal-title">' + call.title + '</div>' +
    '<div class="modal-date">' + formatDate(call.date) + '</div>' +
    '<div class="modal-section-title">Overview</div>' +
    '<div class="modal-summary">' + call.summary_brief + '</div>' +
    '<div class="modal-divider"></div>' +
    '<div class="modal-section-title">Full Recap</div>' +
    '<div class="modal-summary">' + call.summary_full + '</div>' +
    '<div class="modal-divider"></div>' +
    '<div class="modal-section-title">Key Takeaways</div>' +
    '<div class="modal-takeaways">' + takeawayHTML + '</div>' +
    '<div class="modal-divider"></div>' +
    '<div class="modal-section-title">Session Recording</div>' +
    recordingHTML;

  document.getElementById('modal-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

document.getElementById('modal-close').onclick = closeModal;
document.getElementById('modal-overlay').onclick = function(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
};
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

renderCalls();
</script>
</body>
